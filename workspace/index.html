<!DOCTYPE html>

<head>
    <meta charset="utf-8">
    <meta name="description" content="Query workspace using Medsyntax">
    <title>MedsyntaxQA</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
    <script src="../scripts/iframe-resizer/js/iframeResizer.js"></script>
</head>

<body>
<ul id="myList" style="padding: 0"></ul>

<script>
    function pad(num, size) {
        num = num.toString();
        while (num.length < size) num = "0" + num;
        return num;
    }

    // Parent communication script will go here
    window.addEventListener('message', function (event) {
        // Security check: Always check the origin of the sender to prevent cross-site attacks!
        if (event.origin !== window.location.origin) {
            console.error("Message received from unauthorized origin!");
            return;
        }

        if (event.data.type !== "updateUrl") {
            return;
        }

        const data = event.data;
        console.log("Message received from iframe:", data);
        var queryString = event.data.payload;
        var indexPadded = pad(queryString.split('%index%')[0], 9);
        console.log(indexPadded);
        var qsValue = queryString.split('%index%query=')[1];
        console.log(qsValue);
        updateUrl(indexPadded, qsValue);
    });

    function getRandomColor() {
        var letters = '0123456789ABCDEF';
        var color = '#';
        for (var i = 0; i < 6; i++) {
            color += letters[Math.floor(Math.random() * 16)];
        }
        return color;
    }

    function updateUrl(name, value) {
        // Construct URLSearchParams object instance from current URL querystring
        let queryParams = new URLSearchParams(window.location.search);

        // Set new or modify existing page value
        queryParams.set(name, value);
        queryParams.sort();

        // Replace current querystring with the new one
        history.replaceState(null, null, "?" + queryParams.toString());
        history.pushState(null, null, "?" + queryParams.toString());
    }

    function QueryObject(src, iframeQueryString, color) {
        let qObject = Object.create(constructorObject);
        qObject.type = "query";
        qObject.iframeQueryString = iframeQueryString;
        qObject.src = src;
        qObject.color = color;
        return qObject;
    }

    let constructorObject = {}

    var list = [];
    list[0] = QueryObject();
    list[1] = QueryObject();
    list[2] = QueryObject();

    list.forEach(queryFunction);

    function addItemAfter(index) {
        list.forEach(getQuery);
        list.splice(index + 1, 0, QueryObject());
        $("#myList").html("");
        list.forEach(queryFunction);
    }

    function removeThisItem(index) {
        list.forEach(getQuery);
        delete list[index];
        $("#myList").html("");
        list.forEach(queryFunction);
    }

    function getQuery(item, index) {
        var src = document.getElementById("page_is_fresh_" + index).contentWindow.location.href;
        item.src = src;
        // console.log(item.src);
        item.iframeQueryString = src.split("?ws=" + index)[1];
        console.log(item.iframeQueryString);
        return item;
    }

    function queryFunction(item, index) {
        var iframeQueryString = '';
        if (item.iframeQueryString) {
            iframeQueryString = item.iframeQueryString;
        }

        // console.log(item);

        var $li = $("<li>", {id: "li_item_" + index, "class": "item",});
        $li.append("<iframe" +
            " id=\"page_is_fresh_" + index + "\"" +
            " name=\"iframe" + index + "\"" +
            " src=\"../index.html?ws=" + index + iframeQueryString + "\"" +
            " sandbox=\"allow-same-origin allow-scripts allow-top-navigation\"" +
            "></iframe>");
        $li.append("<button onclick=\"removeThisItem(" + index + ")\">Remove</button>")
        $li.append("<button onclick=\"addItemAfter(" + index + ")\">Add</button>")
        $("#myList").append($li);

        if (item.color === undefined) {
            item.color = getRandomColor();
        }
        $('#li_item_' + index).css({
            'border': item.color,
            'border-style': 'solid',
            'border-width': '10px',
            'border-radius': '20px',
            'padding': '10px 0px 10px 10px'
        });

        iframeResize({license: 'GPLv3', log: false}, '#page_is_fresh_' + index);
    }
</script>
</body>
